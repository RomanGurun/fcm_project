name: fcm_flutter
description: A Flutter FCM (Firebase Cloud Messaging) mini project

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase core
  firebase_core: ^3.6.0

  # Firebase Cloud Messaging
  firebase_messaging: ^15.1.3

  # Local notifications (to show FCM notifications in foreground)
  flutter_local_notifications: ^18.0.0

  # For storing notification history
  shared_preferences: ^2.2.2

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/